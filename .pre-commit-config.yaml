repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--line-length=125"]
        types: [file, python]

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--line-length=125", "--profile=black"]
        types: [file, python]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--ignore=E203,W503,W605", "--max-line-length=125"]
        types: [file, python]

  - repo: https://github.com/pre-commit/mirrors-autopep8
    rev: v2.0.4
    hooks:
      - id: autopep8
        args:
          [
            '--ignore=["E203","W503","W605"]',
            "--max-line-length=125",
            "--in-place"
          ]
        types: [file, python]

  - repo: https://github.com/aws-samples/automated-security-helper
    rev: 'v3.0.0' # update with the latest tagged version in the repository
    hooks:
      - id: ash
        stages: [ manual ]
        # uncomment the line below if using "finch" on MacOS
        # args: [ "-f" ]

  - repo: local
    hooks:
      - id: check-copyright
        name: Check for copyright
        entry: python .github/hooks/check-copyright.py
        language: system
        exclude: |
          (?x)^(
            ^\..+|
            .+\.md$|
            .+\.json$|
            .+\.ya?ml$|
            .+\.ipynb$|
            .+\.lock$|
            .+\.config\.js$|
            .+\.config\.mjs$|
            .*/node_modules/.*|
            .*/cdk\.out/.*|
            .*/dist/.*|
            .*/\.tox/.*|
            LICENSE|
            NOTICE|
            tox\.ini|
            pyproject\.toml|
            setup\.cfg|
            setup\.py|
            py\.typed|
            cdk/tsconfig\.json|
            cdk/cdk\.json|
            cdk/cdk\.context\.json|
            cdk/\.prettierrc|
            cdk/bin/deployment/.*\.json\.example|
          )$

      - id: npm-install
        name: npm install
        entry: bash -c 'cd cdk && npm ci'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: jest
        name: jest
        entry: bash -c 'cd cdk && npm test'
        language: system
        files: ^cdk/.*\.(ts|tsx)$
        types: [ file ]
        pass_filenames: false

      - id: eslint
        name: ESLint
        entry: bash -c 'cd cdk && npx eslint --fix --max-warnings 0 "**/*.{js,ts}"'
        language: system
        files: ^cdk/.*\.(ts|tsx|js)$
        types: [file]

      - id: prettier
        name: prettier
        entry: bash -c 'cd cdk && npx prettier --write .'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
        types: [file]
